<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROLE DE ESTOQUE | v.2.2 - By Milton Rangel</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --roxo: #5a189a; --lilas: #9d4edd; --escuro: #1a132e;
            --cinza-fundo: #f4f5f8; --cinza-borda: #d1d5db;
            --verde: #2a9d8f; --vermelho: #e63946; --texto: #374151;
            --alerta-laranja: #f39c12;
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--cinza-fundo); color: var(--texto); overflow-x: hidden; }

        .auth-container { max-width: 400px; margin: 40px auto; padding: 20px; text-align: center; }
        .logo-login { width: 100%; max-width: 300px; margin-bottom: 20px; }
        .card-auth { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid var(--roxo); text-align: left; }

        #layout-sistema { display: none; min-height: 100vh; }
        header { background: var(--escuro); color: white; height: 65px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: fixed; top: 0; width: 100%; z-index: 1000; }
        header img { height: 28px; filter: brightness(0) invert(1); }

        .sidebar { position: fixed; top: 65px; left: 0; bottom: 0; width: 240px; background: #22163f; padding: 20px; }
        .nav-btn { background: transparent; border: none; color: #cbb2ff; padding: 12px; text-align: left; border-radius: 8px; cursor: pointer; width: 100%; display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .nav-btn.active { background: var(--roxo); color: white; }

        main { margin-left: 240px; margin-top: 65px; padding: 20px; }
        .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--cinza-borda); border-radius: 8px; margin-bottom: 10px; font-size: 16px; background: white; color: black; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; color: var(--escuro); }
        
        .btn-principal { background: var(--roxo); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; }
        .btn-excel { background: #1d6f42; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }

        .titulo-setor { font-weight: bold; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 2px solid #ddd; }
        .alert-item { padding: 12px; margin-bottom: 8px; border-radius: 8px; font-size: 13px; border-left: 5px solid; background: white; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f9f9f9; padding: 12px; font-size: 13px; border: 1px solid #eee; }
        td { padding: 10px; border: 1px solid #eee; font-size: 14px; text-align: center; }

        .log-row { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .btn-acao { background: #f0f0f0; border: 1px solid #ccc; padding: 5px 8px; border-radius: 4px; cursor: pointer; margin-left: 5px; font-size: 14px; }
        
        .filtros-inline { display: flex; gap: 10px; margin-bottom: 15px; }
        .filtros-inline > div { flex: 1; }
        .hidden { display: none !important; }

        @media (max-width: 768px) { .sidebar { width: 60px; } .nav-btn span { display: none; } main { margin-left: 60px; } }
    </style>
</head>
<body>

    <div id="section-auth" class="auth-container">
        <img src="https://www.institutoamericas.org/wp-content/uploads/2025/09/logo-instituto-americas.svg" class="logo-login">
        <div id="card-login" class="card-auth">
            <h3>Entrar</h3>
            <input type="text" id="login-user" placeholder="Usuário">
            <input type="password" id="login-pass" placeholder="Senha">
            <button class="btn-principal" onclick="app.login()">ACESSAR</button>
            <p style="text-align:center; margin-top:15px;"><a href="#" onclick="app.toggleAuth()" style="color:var(--roxo); font-weight:bold; text-decoration:none">Solicitar Novo Cadastro</a></p>
        </div>
        <div id="card-cad" class="card-auth hidden">
            <h3>Novo Cadastro</h3>
            <input type="text" id="cad-nome" placeholder="Nome Completo">
            <input type="password" id="cad-pass" placeholder="Senha (mín. 4 digitos)" maxlength="8">
            <button class="btn-principal" onclick="app.cadastrar()">ENVIAR SOLICITAÇÃO</button>
            <p style="text-align:center; margin-top:15px;"><a href="#" onclick="app.toggleAuth()" style="color:gray; text-decoration:none">Voltar</a></p>
        </div>
    </div>

    <div id="layout-sistema">
        <header>
            <div style="display:flex; align-items:center; gap:10px">
                <img src="https://www.institutoamericas.org/wp-content/uploads/2025/09/logo-instituto-americas.svg">
                <span style="font-weight:bold">ESTOQUE</span>
            </div>
            <div style="display:flex; align-items:center; gap:15px">
                <small id="user-info" style="font-weight:600"></small>
                <button onclick="location.reload()" style="background:none; border:1px solid white; color:white; padding:4px 8px; border-radius:4px; cursor:pointer">Sair</button>
            </div>
        </header>

        <aside class="sidebar">
            <button id="nav-dash" class="nav-btn active" onclick="app.nav('dash')">🏠 <span>Início</span></button>
            <button id="nav-est" class="nav-btn" onclick="app.nav('est')">🔍 <span>Estoque Atual</span></button>
            <button id="nav-mov" class="nav-btn" onclick="app.nav('mov')">🔄 <span>Movimentação</span></button>
            <button id="nav-ent" class="nav-btn" onclick="app.nav('ent')">📥 <span>Entrada</span></button>
            <button id="nav-sai" class="nav-btn" onclick="app.nav('sai')">📤 <span>Saída</span></button>
            <button id="nav-rel" class="nav-btn hidden" onclick="app.nav('rel')">📋 <span>Logs Sistema</span></button>
            <button id="nav-adm" class="nav-btn hidden" onclick="app.nav('adm')">⚙️ <span>Gestão Usuários</span></button>
        </aside>

        <main>
            <div id="v-dash" class="view">
                <div class="card" style="text-align:center">
                    <h1 id="count-itens" style="margin:0; color:var(--roxo)">0</h1>
                    <p style="margin:0; color:gray">Total de Kits em estoque</p>
                </div>
                <div id="lista-quarentena"></div>
                <div id="lista-vencendo"></div>
            </div>

            <div id="v-est" class="view hidden">
                <div class="card">
                    <h3>Estoque Atual</h3>
                    <div class="filtros-inline">
                        <div><select id="filtro-coluna" onchange="app.renderEstoque()"><option value="nome">Nome</option><option value="cod">Código</option><option value="prot">Protocolo</option><option value="venc">Vencimento</option></select></div>
                        <div><input type="text" id="busca" placeholder="Filtrar..." onkeyup="app.renderEstoque()"></div>
                    </div>
                    <table><thead><tr><th>Cód</th><th>Kit</th><th>Prot</th><th>Venc</th></tr></thead><tbody id="lista-est"></tbody></table>
                </div>
            </div>

            <div id="v-mov" class="view hidden"><div class="card"><h3>Movimentação</h3><button class="btn-excel" onclick="app.exportarExcel()">📗 Excel</button><div id="lista-movimentacao"></div></div></div>
            <div id="v-ent" class="view hidden"><div class="card"><h3>Entrada</h3><label>Código</label><input type="text" id="ent-cod"><label>Nome</label><input type="text" id="ent-nome"><label>Protocolo</label><input type="text" id="ent-prot"><label>Vencimento</label><input type="date" id="ent-venc"><button class="btn-principal" onclick="app.dbSalvar()">SALVAR</button></div></div>
            <div id="v-sai" class="view hidden"><div class="card"><h3>Saída</h3><input type="text" id="sai-cod" placeholder="Código do Kit"><button class="btn-principal" style="background:var(--vermelho); margin-top:10px" onclick="app.dbRemover()">BAIXA</button></div></div>
            <div id="v-rel" class="view hidden"><div class="card"><h3>Logs</h3><div id="lista-logs"></div></div></div>
            <div id="v-adm" class="view hidden"><div class="card"><h3>Gestão Usuários</h3><div id="lista-users"></div></div></div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDfmAU3fRhjqLpeOvED3Hb1ohQ0XKXBWpA",
            authDomain: "iepeges.firebaseapp.com",
            databaseURL: "https://iepeges-default-rtdb.firebaseio.com",
            projectId: "iepeges",
            storageBucket: "iepeges.firebasestorage.app",
            messagingSenderId: "722436445499",
            appId: "1:722436445499:web:e4c968164056477d44d31e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const app = {
            user: null, 
            dados: { materiais: {}, logs: {}, usuarios: {} },

            init() {
                db.ref('/').on('value', (snap) => {
                    const val = snap.val() || {};
                    this.dados.materiais = val.materiais || {};
                    this.dados.logs = val.logs || {};
                    this.dados.usuarios = val.usuarios || {};
                    this.renderEstoque();
                    this.renderLogs();
                    this.renderMov();
                    this.renderAdmin();
                    this.checkVencimento();
                });
            },

            login() {
                const u = document.getElementById('login-user').value.toLowerCase().trim();
                const p = document.getElementById('login-pass').value.trim();
                if(u === 'iepeges' && p === 'itc@123@') {
                    this.user = { nome: 'MASTER', login: 'iepeges', role: 'admin' };
                } else {
                    this.user = Object.values(this.dados.usuarios).find(x => x.login === u && x.pass === p);
                }
                if(this.user) {
                    document.getElementById('section-auth').classList.add('hidden');
                    document.getElementById('layout-sistema').style.display = 'block';
                    document.getElementById('user-info').innerText = this.user.nome;
                    if(this.user.role === 'admin') {
                        document.getElementById('nav-adm').classList.remove('hidden');
                        document.getElementById('nav-rel').classList.remove('hidden');
                    }
                    this.nav('dash');
                } else { alert("Acesso Negado."); }
            },

            renderAdmin() {
                const container = document.getElementById('lista-users');
                if(!container) return;
                const isMaster = (this.user && this.user.login === 'iepeges');
                container.innerHTML = Object.entries(this.dados.usuarios).map(([key, u]) => `
                    <div class="log-row">
                        <span>
                            <b>${u.nome}</b> <small style="color:blue">[${u.role.toUpperCase()}]</small><br>
                            <small>Login: ${u.login} | Senha: ${u.pass}</small>
                        </span>
                        <div>
                            <button class="btn-acao" onclick="app.editPass('${key}')" title="Mudar Senha">🔑</button>
                            <button class="btn-acao" onclick="app.editRole('${key}', '${u.role}')" title="Mudar Cargo">🛡️</button>
                            ${isMaster ? `<button class="btn-acao" onclick="app.delUser('${key}')" style="color:red">🗑️</button>` : ''}
                        </div>
                    </div>
                `).join('');
            },

            editPass(key) {
                const p = prompt("Digite a nova senha:");
                if(p && p.length >= 4) {
                    db.ref('usuarios/' + key).update({ pass: p });
                    alert("Senha alterada!");
                }
            },

            editRole(key, current) {
                const next = current === 'admin' ? 'user' : 'admin';
                if(confirm(`Mudar usuário para ${next.toUpperCase()}?`)) {
                    db.ref('usuarios/' + key).update({ role: next });
                }
            },

            delUser(key) { if(confirm("Remover permanentemente?")) db.ref('usuarios/' + key).remove(); },

            cadastrar() {
                const n = document.getElementById('cad-nome').value.trim();
                const p = document.getElementById('cad-pass').value.trim();
                if(n.length < 3 || p.length < 4) return alert("Dados insuficientes.");
                const login = n.split(' ')[0].toLowerCase() + Math.floor(Math.random()*100);
                db.ref('usuarios').push({ nome: n, login: login, pass: p, role: 'user' });
                alert("Enviado! Login: " + login);
                this.toggleAuth();
            },

            dbSalvar() {
                const cod = document.getElementById('ent-cod').value.trim();
                const nome = document.getElementById('ent-nome').value.trim();
                const prot = document.getElementById('ent-prot').value.trim();
                const venc = document.getElementById('ent-venc').value;
                if(!cod || !nome) return alert("Erro: Preencha Código e Nome.");
                db.ref('materiais/' + cod).set({ cod, nome, prot, venc });
                db.ref('logs').push({ data: new Date().toLocaleString('pt-BR'), user: this.user.nome, acao: 'ENTRADA', desc: `Kit: ${nome} | Prot: ${prot}` });
                ['ent-cod','ent-nome','ent-prot','ent-venc'].forEach(id => document.getElementById(id).value = "");
                alert("Salvo!");
            },

            dbRemover() {
                const cod = document.getElementById('sai-cod').value.trim();
                const item = this.dados.materiais[cod];
                if(item && confirm(`Dar baixa em ${item.nome}?`)) {
                    db.ref('materiais/' + cod).remove();
                    db.ref('logs').push({ data: new Date().toLocaleString('pt-BR'), user: this.user.nome, acao: 'SAÍDA', desc: `Kit: ${item.nome}` });
                    document.getElementById('sai-cod').value = "";
                }
            },

            checkVencimento() {
                const q = document.getElementById('lista-quarentena');
                const v = document.getElementById('lista-vencendo');
                if(!q) return; q.innerHTML = ""; v.innerHTML = "";
                const hoje = new Date(); hoje.setHours(0,0,0,0);
                Object.values(this.dados.materiais).forEach(m => {
                    if(!m.venc) return;
                    const dVenc = new Date(m.venc); dVenc.setHours(0,0,0,0);
                    const diff = Math.ceil((dVenc - hoje) / (1000*60*60*24));
                    const fmt = m.venc.split('-').reverse().join('/');
                    if(diff < 0) q.innerHTML += `<div class="alert-item" style="border-color:red">🛑 <b>VENCIDO:</b> ${m.nome} (${fmt})</div>`;
                    else if(diff <= 10) v.innerHTML += `<div class="alert-item" style="border-color:orange">⚠️ <b>VENCENDO:</b> ${m.nome} (${diff} dias)</div>`;
                });
                document.getElementById('count-itens').innerText = Object.keys(this.dados.materiais).length;
            },

            renderEstoque() {
                const col = document.getElementById('filtro-coluna').value;
                const busca = document.getElementById('busca').value.toLowerCase();
                const corpo = document.getElementById('lista-est');
                corpo.innerHTML = Object.values(this.dados.materiais).filter(m => {
                    let v = (m[col] || "").toLowerCase();
                    if(col === 'venc' && v) v = v.split('-').reverse().join('/');
                    return v.includes(busca);
                }).map(m => `<tr><td>${m.cod}</td><td style="text-align:left">${m.nome}</td><td>${m.prot || '-'}</td><td>${m.venc ? m.venc.split('-').reverse().join('/') : '-'}</td></tr>`).join('');
            },

            renderMov() {
                const container = document.getElementById('lista-movimentacao');
                if(!container) return;
                const logs = Object.values(this.dados.logs).reverse().filter(l => l.acao === 'ENTRADA' || l.acao === 'SAÍDA');
                container.innerHTML = logs.map(l => `<div class="log-row"><span><b>${l.acao}</b>: ${l.desc}</span><small>${l.data}</small></div>`).join('');
            },

            renderLogs() {
                const container = document.getElementById('lista-logs');
                if(!container) return;
                container.innerHTML = Object.values(this.dados.logs).reverse().map(l => `<div class="log-row"><span>${l.user}: ${l.acao}</span><small>${l.data}</small></div>`).join('');
            },

            exportarExcel() {
                const ws = XLSX.utils.json_to_sheet(Object.values(this.dados.logs)); 
                const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Logs");
                XLSX.writeFile(wb, "Relatorio.xlsx");
            },

            nav(v) {
                document.querySelectorAll('.view').forEach(x => x.classList.add('hidden'));
                document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
                document.getElementById('v-'+v).classList.remove('hidden');
                document.getElementById('nav-'+v).classList.add('active');
            },

            toggleAuth() { document.getElementById('card-login').classList.toggle('hidden'); document.getElementById('card-cad').classList.toggle('hidden'); }
        };
        app.init();
    </script>
</body>
</html>
